<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Pengaduan - Lapor Sragen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/2.3.6/css/dataTables.dataTables.min.css" />
    <style>
        /* Custom wrapper for table inside container */
        .table-container {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 2rem;
            margin-top: 1rem;
            box-shadow: var(--card-shadow);
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="#" class="navbar-brand">
            <span>📢</span> Lapor Sragen Admin
        </a>
        <div class="navbar-user">
            <div class="user-badge">
                <span>👤</span> <span id="user-display">Memuat...</span>
            </div>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div class="dashboard-title">
                <h2>Daftar Pengaduan Masyarakat</h2>
                <p>Kelola semua laporan kerusakan dan pengaduan dari masyarakat Sragen</p>
            </div>
        </div>

        <div class="table-container">
            <table id="pengaduan_table" class="display" style="width:100%">
                <thead>
                    <tr>
                        <th>Judul Pengaduan</th>
                        <th>Isi Pengaduan</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>

    <footer>
        &copy; 2026 Pemerintah Kabupaten Sragen. All rights reserved.
    </footer>

    <script src="https://code.jquery.com/jquery-4.0.0.js"
        integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <script src="https://cdn.datatables.net/2.3.6/js/dataTables.min.js"></script>
    <script>
        // Authentication Check
        let userRole = null;
        let token = localStorage.getItem("token");

        if (!token) {
            alert("Sesi Anda telah berakhir atau Anda belum login. Silakan login terlebih dahulu.");
            window.location.href = "index.html";
        } else {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                userRole = payload.role;
                
                // Show username/email from token if present, otherwise default to role
                document.getElementById("user-display").innerHTML = `Masuk sebagai: <strong>${userRole}</strong>`;

                if (userRole !== "admin") {
                    alert("Akses Ditolak: Halaman ini hanya untuk Administrator.");
                    window.location.href = "tambah_pengaduan.html";
                }
            } catch (e) {
                localStorage.removeItem("token");
                window.location.href = "index.html";
            }
        }

        // Logout function
        function logout() {
            localStorage.removeItem("token");
            window.location.href = "index.html";
        }

        // Delete complaint function
        async function deleteComplaint(id) {
            if (!confirm("Apakah Anda yakin ingin menghapus pengaduan ini?")) {
                return;
            }

            try {
                const response = await fetch(`http://localhost:3000/api/pengaduan/${id}`, {
                    method: "DELETE",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                const result = await response.json();

                if (!response.ok) {
                    alert("Gagal menghapus pengaduan: " + (result.message || "Kesalahan server"));
                } else {
                    alert("Pengaduan berhasil dihapus.");
                    // Reload DataTables content
                    location.reload();
                }
            } catch (error) {
                console.error("Error deleting complaint:", error);
                alert("Gagal menghapus pengaduan. Pastikan server backend aktif.");
            }
        }

        // Load complaints list into DataTable
        document.addEventListener("DOMContentLoaded", async function () {
            if (!token || userRole !== "admin") return;

            try {
                const response = await fetch("http://localhost:3000/api/pengaduan", {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    },
                });

                const result = await response.json();

                if (!response.ok) {
                    alert("Gagal mengambil data: " + (result.message || "Akses ditolak"));
                    if (response.status === 401 || response.status === 403) {
                        logout();
                    }
                } else {
                    new DataTable("#pengaduan_table", {
                        data: result.data,
                        responsive: true,
                        columns: [
                            { 
                                data: "judul",
                                width: "30%"
                            },
                            { 
                                data: "isi",
                                width: "50%"
                            },
                            {
                                data: null,
                                width: "20%",
                                orderable: false,
                                render: function (data, type, row, meta) {
                                    return `
                                    <div class="table-actions">
                                        <a href="edit.html?id=${row.id}" class="btn-action-edit">Ubah</a>
                                        <a href="hapus.html?id=${row.id}" class="btn-action-delete">Hapus</a>
                                    </div>
                                    `;
                                }
                            }
                        ]
                    });
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                alert("Gagal terhubung ke server backend.");
            }
        });
    </script>
</body>

</html>
